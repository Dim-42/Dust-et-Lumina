{% capture announcement_md %}
{% include announcement-content.md %}
{% endcapture %}
{% assign announcement_trimmed = announcement_md | strip %}

{% if announcement_trimmed != "" %}
<div id="announcementModal"
     class="system-modal system-announcement"
     role="dialog"
     aria-modal="true"
     aria-hidden="true"
     data-announcement-key="del_announcement_seen_v1">
  <div class="announcement-panel" role="document">
    <div class="announcement-topline">
      <span class="announcement-tag">[LOGIX] SYSTEM ANNOUNCEMENT</span>
      <button type="button" class="announcement-close" data-announcement-close aria-label="Close">&times;</button>
    </div>

    <div class="announcement-body">
      {{ announcement_md | markdownify }}
    </div>

    <div class="announcement-actions">
      <button type="button" class="btn-classified" data-announcement-close>ACKNOWLEDGE</button>
    </div>
  </div>
</div>
{% endif %}
